<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme Web SIE-UEMOA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .nav-tabs { cursor: pointer; }
        .table-container { max-height: 600px; overflow: auto; margin-top: 20px; }
        #drop-zone { border: 2px dashed #0d6efd; padding: 30px; text-align: center; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h2 class="text-center mb-4">Système d'Information Énergétique (SIE-UEMOA)</h2>
    
    <div id="drop-zone" class="mb-4 bg-white">
        <p>Glissez votre fichier <b>.xlsm</b> ici ou cliquez pour choisir</p>
        <input type="file" id="excel_file" class="form-control" accept=".xlsm, .xlsx">
    </div>

    <ul class="nav nav-tabs" id="sheet-tabs" role="tablist"></ul>

    <div class="tab-content bg-white p-3 border border-top-0 rounded-bottom">
        <div id="table-display" class="table-container">
            <p class="text-muted text-center">Aucune donnée à afficher. Veuillez charger le fichier de collecte.</p>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('excel_file');
    const tabsContainer = document.getElementById('sheet-tabs');
    const display = document.getElementById('table-display');

    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });

            // Nettoyer l'affichage précédent
            tabsContainer.innerHTML = '';
            
            // Parcourir les feuilles identifiées (Sheet1, Sheet2, etc.)
            workbook.SheetNames.forEach((sheetName, index) => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                li.innerHTML = `<a class="nav-link ${index === 0 ? 'active' : ''}" onclick="showSheet('${sheetName}')">${sheetName}</a>`;
                tabsContainer.appendChild(li);

                if(index === 0) showSheet(sheetName);
            });

            // Stocker le classeur globalement pour y accéder via showSheet
            window.currentWorkbook = workbook;
        };
        reader.readAsArrayBuffer(file);
    }

    function showSheet(sheetName) {
        // Mettre à jour l'état visuel des onglets
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if(link.innerText === sheetName) link.classList.add('active');
        });

        const worksheet = window.currentWorkbook.Sheets[sheetName];
        // Convertir en HTML avec SheetJS
        const htmlTable = XLSX.utils.sheet_to_html(worksheet, { id: "data-table", editable: false });
        
        display.innerHTML = htmlTable;
        // Ajouter des classes Bootstrap au tableau généré
        const table = display.querySelector('table');
        if(table) table.className = "table table-sm table-hover table-bordered table-striped";
    }
</script>

</body>
</html>
